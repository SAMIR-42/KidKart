<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidKart - Trending Area</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="menshop.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="kk-header">
      <a href="../index.html" class="kk-logo"><i class="fas fa-fire"></i><span>Trending Toys</span></a>
      <button class="kk-menu-btn" data-kk-menu aria-label="Menu"><i class="fas fa-bars"></i></button>
      <nav class="kk-nav">
        <a href="../index.html"><i class="fas fa-home"></i> Home</a>
        <a href="menshop.html" class="kk-active"><i class="fas fa-store"></i> Shop</a>
        <a href="mencart.html" class="kk-cart-link">
          <i class="fas fa-shopping-cart"></i> Cart
          <span class="kk-cart-badge kk-hidden" data-cart-badge>0</span>
        </a>
      </nav>
    </header>

    <!-- SEARCH BAR -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name..." />
    </div>
    <a href="track.html" class="track-btn"
      >Track Your Order <i class="fas fa-map-marker-alt"></i
    ></a>

    <!-- PRODUCTS GRID -->
    <div class="shop-container" id="shopContainer">
      <!-- Product cards inserted by JS -->
    </div>
    <a href="../pleasure/pleasure.html" class="goPleasureBtn"
      >Go to learning Store <i class="fa-solid fa-book"></i
    ></a>

    <script src="../js/kidkart-core.js"></script>
    <script src="menshop.js"></script>
  </body>
</html>
