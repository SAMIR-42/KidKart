<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidKart - Learning Area</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="pleasure.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="kk-header">
      <a href="../index.html" class="kk-logo"><i class="fas fa-book-open"></i><span>Learning Toys</span></a>
      <button class="kk-menu-btn" data-kk-menu aria-label="Menu"><i class="fas fa-bars"></i></button>
      <nav class="kk-nav">
        <a href="../index.html"><i class="fas fa-home"></i> Home</a>
        <a href="pleasure.html" class="kk-active"><i class="fas fa-graduation-cap"></i> Shop</a>
        <a href="pleasurecart.html" class="kk-cart-link">
          <i class="fas fa-shopping-cart"></i> Cart
          <span class="kk-cart-badge kk-hidden" data-cart-badge>0</span>
        </a>
      </nav>
    </header>

    <!-- SEARCH BAR -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name..." />
    </div>

    <!-- PRODUCTS GRID -->
    <div class="shop-container" id="shopContainer">
      <!-- Product cards with swipeable images inserted by JS -->
    </div>

    <script src="../js/kidkart-core.js"></script>
    <script src="pleasure.js"></script>
  </body>
</html>
