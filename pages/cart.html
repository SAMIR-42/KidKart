<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidKart — Your Cart</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="cart.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="kk-header">
      <a href="../index.html" class="kk-logo">
        <i class="fas fa-cart-shopping"></i>
        <span>KidKart</span>
      </a>
      <button class="kk-menu-btn" data-kk-menu aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
      <nav class="kk-nav">
        <a href="../index.html"><i class="fas fa-home"></i> Home</a>
        <a href="shop.html"><i class="fas fa-store"></i> Shop</a>
        <a href="cart.html" class="kk-cart-link kk-active">
          <i class="fas fa-shopping-cart"></i> Cart
          <span class="kk-cart-badge kk-hidden" data-cart-badge>0</span>
        </a>
      </nav>
    </header>

    <main class="kk-main cart-page">
      <h1 class="kk-page-title">Your Cart</h1>
      <p class="kk-page-sub">Review items before checkout — prices update live.</p>

      <div id="cartContainer" class="cart-list"></div>
      <div id="emptyCart" class="cart-empty kk-hidden">
        <i class="fas fa-shopping-basket"></i>
        <h2>Your cart is empty</h2>
        <p>Add some awesome toys from our shop!</p>
        <a href="shop.html" class="kk-btn kk-btn-primary">Go Shopping</a>
      </div>

      <div id="cartSummary" class="cart-summary kk-hidden">
        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="totalPrice">₹0</strong>
        </div>
        <div class="summary-row summary-delivery">
          <span>Delivery</span>
          <strong class="free-tag">FREE</strong>
        </div>
        <div class="summary-row summary-total">
          <span>Total</span>
          <strong id="grandTotal">₹0</strong>
        </div>
        <div class="cart-actions">
          <button type="button" id="backBtn" class="kk-btn kk-btn-ghost">
            <i class="fas fa-arrow-left"></i> Continue Shopping
          </button>
          <button type="button" id="buyBtn" class="kk-btn kk-btn-primary">
            Proceed to Checkout <i class="fas fa-lock"></i>
          </button>
        </div>
      </div>
    </main>

    <footer class="kk-footer">
      <p>© 2026 KidKart</p>
      <div class="kk-social">
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/__patil__42?gsh=aG1tYnZ2dDhlNTIh" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
      </div>
    </footer>

    <script src="../js/kidkart-core.js"></script>
    <script src="cart.js"></script>
  </body>
</html>
